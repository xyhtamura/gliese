<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background Gradient: Deep plum-black space -->
    <radialGradient id="space" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1b1625"/>
      <stop offset="100%" stop-color="#0a070e"/>
    </radialGradient>
    
    <!-- Core Gradient: Glowing planet core -->
    <radialGradient id="core-glow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd02e"/>
      <stop offset="40%" stop-color="#be5727"/>
      <stop offset="100%" stop-color="#1c1020"/>
    </radialGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="16" fill="url(#space)"/>

  <!-- Instrument/Telemetry grid lines -->
  <path d="M32 8v48M8 32h48" fill="none" stroke="#00dba9" stroke-width="0.75" opacity="0.15"/>
  
  <!-- Outer atmosphere boundary (b) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#00dba9" stroke-width="0.75" stroke-dasharray="2,3" opacity="0.2"/>
  
  <!-- Sound channel axis (r0) -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#ffd02e" stroke-width="0.75" stroke-dasharray="4,2" opacity="0.3"/>

  <!-- Specular/absorb core boundary (a) -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="#be5727" stroke-width="1" opacity="0.4"/>
  
  <!-- Central planetary core -->
  <circle cx="32" cy="32" r="6" fill="url(#core-glow)" stroke="#be5727" stroke-width="0.5"/>

  <!-- Refracted Ray Paths (representing the acoustic delay lines) -->
  <!-- Cyan Ray (bends over the core) -->
  <path d="M 12,32 C 18,15 46,15 52,32" fill="none" stroke="#00dba9" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  
  <!-- Lime Ray (bends under the core) -->
  <path d="M 12,32 C 18,49 46,49 52,32" fill="none" stroke="#8eff3a" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>

  <!-- Source and Receiver Nodes -->
  <!-- Source (Transducer) -->
  <circle cx="12" cy="32" r="3.5" fill="#bd74e4" stroke="#ffffff" stroke-width="0.75"/>
  
  <!-- Receiver (Hydrophone/Sensor) -->
  <circle cx="52" cy="32" r="3.5" fill="#ffd02e" stroke="#ffffff" stroke-width="0.75"/>
</svg>
